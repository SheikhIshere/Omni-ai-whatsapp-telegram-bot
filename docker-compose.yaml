services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    env_file:
      - backend/.env
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3011:3011"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8011
    depends_on:
      - backend
    restart: always
