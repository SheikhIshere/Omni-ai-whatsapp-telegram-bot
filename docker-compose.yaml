services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    env_file:
      - backend/.env
    restart: always
    command: sh -c "alembic upgrade head && python run.py"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - PORT=3001
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: always
    command: npm run dev
